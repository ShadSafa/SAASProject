    }

    }

      background: radial-gradient(circle, rgba(220,38,38,0.42) 0%, transparent 70%);

    .orb-2 { /* Violet — top-left: general depth */

      top: -230px; left: -190px;
      background: radial-gradient(circle, rgba(109,40,217,0.36) 0%, transparent 70%);

    .orb-3 { /* Emerald — bottom-right: reinforces "Completed" success */

      bottom: -160px; right: -130px;
      background: radial-gradient(circle, rgba(5,150,105,0.4) 0%, transparent 70%);

      bottom: -130px; left: -110px;
      background: radial-gradient(circle, rgba(8,145,178,0.3) 0%, transparent 70%);

      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      color: white;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      flex-shrink: 0;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .header-title h1 {
      font-size: 1rem;
      font-weight: 700;
      background: linear-gradient(120deg, #f1f5f9 30%, #a5b4fc 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.01em;
    }

    .header-subtitle {
      font-size: 0.68rem;
      color: rgba(255,255,255,0.38);
      margin-top: 3px;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
    }

    .milestone-badge {
      background: rgba(99,102,241,0.2);
      color: #a5b4fc;
      border: 1px solid rgba(99,102,241,0.4);
      padding: 4px 14px;
      border-radius: 9999px;
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      backdrop-filter: blur(8px);
    }

    .progress-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .progress-text {
      font-size: 0.68rem;
      color: rgba(255,255,255,0.42);
      white-space: nowrap;
    }

    .progress-track {
      width: 130px;
      height: 5px;
      background: rgba(255,255,255,0.09);
      border-radius: 9999px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #10b981, #818cf8);
      border-radius: 9999px;
      transition: width 0.6s ease;
      box-shadow: 0 0 10px rgba(129,140,248,0.5);
    }

    /* ── Board ───────────────────────────────────────────── */
    .board {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      padding: 14px 16px;
      flex: 1;
      min-height: 0;
      overflow: hidden;
    }

    /* ── Column ──────────────────────────────────────────── */
    .column {
      display: flex;
      flex-direction: column;
      border-radius: 14px;
      overflow: hidden;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 8px 32px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.05);
    }

    .column-header {
      padding: 12px 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .column-title {
      font-size: 0.68rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      line-height: 1;
      color: white;
      text-shadow: 0 1px 6px rgba(0,0,0,0.5);
    }

    .column-count {
      font-size: 0.65rem;
      font-weight: 700;
      background: rgba(0,0,0,0.28);
      color: rgba(255,255,255,0.85);
      padding: 2px 9px;
      border-radius: 9999px;
      border: 1px solid rgba(255,255,255,0.12);
    }

    .column-body {
      flex: 1;
      overflow-y: auto;
      padding: 9px;
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    .column-body::-webkit-scrollbar { width: 3px; }
    .column-body::-webkit-scrollbar-track { background: transparent; }
    .column-body::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.15);
      border-radius: 9999px;
    }

    .col-pending {
      background: rgba(220,38,38,0.07);
      border-color: rgba(220,38,38,0.28);
    }
    .col-pending .column-header {
      background: linear-gradient(135deg, rgba(220,38,38,0.88), rgba(185,28,28,0.78));
    }

    .col-current-pending {
      background: rgba(248,113,113,0.07);
      border-color: rgba(252,165,165,0.22);
    }

    }

    #refreshStatus { color: #34d399; margin-left: 4px; }
  </style>
</head>

    {id:"11-02",phase:11,phaseName:"Polish & Launch Preparation",seq:2,total:6,name:"Performance Profiling & Optimization",status:"pending"},
    {id:"11-03",phase:11,phaseName:"Polish & Launch Preparation",seq:3,total:6,name:"Production Environment Setup",status:"pending"},
    {id:"11-04",phase:11,phaseName:"Polish & Launch Preparation",seq:4,total:6,name:"Deployment Automation (CI/CD)",status:"pending"},
    {id:"11-05",phase:11,phaseName:"Polish & Launch Preparation",seq:5,total:6,name:"Monitoring Setup (Sentry, Logs)",status:"pending"},
    {id:"11-06",phase:11,phaseName:"Polish & Launch Preparation",seq:6,total:6,name:"User Documentation",status:"pending"},
  ]
};
// === END KANBAN STATE ===

// ================================================================
// Rendering
// ================================================================

const COLUMNS = [
  { key: "pending",          label: "Pending",                 cls: "col-pending"          },
  { key: "current_pending",  label: "Current Phase Pending",   cls: "col-current-pending"  },
  { key: "current_complete", label: "Current Phase Complete",  cls: "col-current-complete" },
  { key: "completed",        label: "Completed",               cls: "col-completed"        },
];

function cardHTML(p) {
  const phaseNum = String(p.phase).padStart(2, "0");
  return `
    <div class="card">
      <div class="card-top">
        <span class="phase-badge ph-${p.phase}">Phase ${phaseNum}</span>
        <span class="seq-label">Step ${p.seq} of ${p.total}</span>
      </div>
      <div class="card-name">${p.name}</div>
      <div class="card-phase-name">${p.phaseName}</div>
    </div>`;
}

function render(data) {
  const { project, milestone, lastUpdated, plans } = data;

  // Header
  document.getElementById("headerSubtitle").textContent =
    `${project}  ·  Last updated: ${lastUpdated}`;
  document.getElementById("milestoneBadge").textContent = milestone;

  // Progress (count completed + current_complete as "done for progress")
  const total = plans.length;
  const done  = plans.filter(p => p.status === "completed" || p.status === "current_complete").length;
  const pct   = total > 0 ? Math.round((done / total) * 100) : 0;
  document.getElementById("progressText").textContent = `${done} / ${total} plans`;
  document.getElementById("progressFill").style.width = `${pct}%`;

  const fullyDone = plans.filter(p => p.status === "completed").length;
  document.getElementById("footerInfo").textContent =
    `${total} plans across 11 phases  ·  ${fullyDone} fully completed  ·  ${pct}% overall progress`;

  // Group plans by status (preserve phase+seq order)
  const groups = { pending: [], current_pending: [], current_complete: [], completed: [] };
  [...plans]
    .sort((a, b) => a.phase !== b.phase ? a.phase - b.phase : a.seq - b.seq)
    .forEach(p => { if (groups[p.status]) groups[p.status].push(p); });

  // Render columns
  document.getElementById("board").innerHTML = COLUMNS.map(col => {
    const cards = groups[col.key];
    const body  = cards.length
      ? cards.map(cardHTML).join("")
      : `<div class="empty-state">No items here yet</div>`;
    return `
      <div class="column ${col.cls}">
        <div class="column-header">
          <span class="column-title">${col.label}</span>
          <span class="column-count">${cards.length}</span>
        </div>
        <div class="column-body">${body}</div>
      </div>`;
  }).join("");
}

// Initial render from embedded state
render(STATE);

// ── Auto-refresh (polling kanban-state.json when served) ──
let refreshTimer = null;

document.getElementById("autoRefresh").addEventListener("change", function () {
  const status = document.getElementById("refreshStatus");
  if (this.checked) {
    status.textContent = "(active)";
    refreshTimer = setInterval(async () => {
      try {
        const res = await fetch(`kanban-state.json?_=${Date.now()}`);
        if (res.ok) {
          const data = await res.json();
          render(data);
          status.textContent = `(refreshed ${new Date().toLocaleTimeString()})`;
        }
      } catch (_) {
        status.textContent = "(server not available)";
      }
    }, 30000);
  } else {
    clearInterval(refreshTimer);
    refreshTimer = null;
    status.textContent = "";
  }
});
</script>
</body>
</html>
